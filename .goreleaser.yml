version: 2

builds:
  - main: ./cmd/spark
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: spark
    package_name: spark
    vendor: feza-ai
    maintainer: feza-ai
    description: Single-binary pod orchestrator for GPU hosts. Accepts Kubernetes manifests and runs workloads via podman.
    license: Proprietary
    formats:
      - deb
    bindir: /usr/local/bin
    contents:
      - src: deploy/spark.service
        dst: /etc/systemd/system/spark.service
      - src: deploy/registry.service
        dst: /etc/systemd/system/registry.service
      - src: deploy/spark-auto-upgrade.service
        dst: /etc/systemd/system/spark-auto-upgrade.service
      - src: deploy/spark-auto-upgrade.timer
        dst: /etc/systemd/system/spark-auto-upgrade.timer
      - src: deploy/spark-auto-upgrade.sh
        dst: /usr/local/lib/spark/auto-upgrade.sh
        file_info:
          mode: 0755
      - src: deploy/spark.env
        dst: /etc/spark/spark.env
        type: config
      - dst: /etc/spark/manifests/
        type: dir
    scripts:
      postinstall: deploy/nfpm/postinstall.sh
      preremove: deploy/nfpm/preremove.sh

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore\\(deps\\):"
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?!:.+$'
      order: 0
    - title: "Features"
      regexp: '^feat.*'
      order: 1
    - title: "Bug Fixes"
      regexp: '^fix.*'
      order: 2
    - title: "Performance"
      regexp: '^perf.*'
      order: 3
    - title: "Other"
      order: 999

release:
  github:
    owner: feza-ai
    name: spark
  prerelease: auto
  make_latest: true
